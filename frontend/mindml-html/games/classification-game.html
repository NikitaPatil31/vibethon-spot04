<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classification Game - MindML</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .game-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .game-header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .game-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .game-stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 20px;
        }

        .game-area {
            padding: 2rem;
        }

        /* Objects to classify */
        .objects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .object-card {
            background: #f9fafb;
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
        }

        .object-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .object-card.selected {
            border-color: #667eea;
            background: #eff6ff;
        }

        .object-emoji {
            font-size: 4rem;
            margin-bottom: 0.5rem;
        }

        .object-name {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .object-features {
            font-size: 0.75rem;
            color: #6b7280;
        }

        /* Categories */
        .categories {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .category {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 1rem;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .category:hover {
            transform: scale(1.02);
        }

        .category h3 {
            margin-bottom: 0.5rem;
        }

        .category-items {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        /* Score Panel */
        .score-panel {
            background: #f3f4f6;
            border-radius: 20px;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
        }

        .score {
            font-size: 1.5rem;
            font-weight: bold;
            color: #f5576c;
        }

        .feedback {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 12px;
            display: none;
        }

        .feedback.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }

        .feedback.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }

        .reset-btn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .categories {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1><i class="fas fa-tags"></i> Classification Game</h1>
            <p>Learn how ML classifies objects by sorting them into categories!</p>
            <div class="game-stats">
                <div class="stat"><i class="fas fa-star"></i> Score: <span id="score">0</span></div>
                <div class="stat"><i class="fas fa-check-circle"></i> Classified: <span id="classified">0</span>/<span id="total">6</span></div>
            </div>
        </div>

        <div class="game-area">
            <div class="objects-grid" id="objectsGrid"></div>
            
            <div class="categories" id="categories">
                <div class="category" onclick="classifySelected('fruit')">
                    <h3><i class="fas fa-apple-alt"></i> Fruits</h3>
                    <div class="category-items">Sweet, edible, contains seeds</div>
                </div>
                <div class="category" onclick="classifySelected('vegetable')">
                    <h3><i class="fas fa-carrot"></i> Vegetables</h3>
                    <div class="category-items">Savory, often cooked, part of main meal</div>
                </div>
            </div>

            <div id="feedback" class="feedback"></div>

            <div class="score-panel">
                <div>
                    <i class="fas fa-lightbulb"></i> <strong>Classification Tip:</strong> Look at features like taste, texture, and how it's eaten!
                </div>
                <div>
                    <span class="score"><span id="totalScore">0</span> points</span>
                    <button class="reset-btn" onclick="resetGame()"><i class="fas fa-redo"></i> Reset</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentScore = 0;
        let classifiedCount = 0;
        let selectedObject = null;
        
        const objects = [
            { id: 1, name: "Apple", emoji: "🍎", features: "Sweet, red/green, grows on trees", category: "fruit", points: 10 },
            { id: 2, name: "Carrot", emoji: "🥕", features: "Orange, crunchy, grows underground", category: "vegetable", points: 10 },
            { id: 3, name: "Banana", emoji: "🍌", features: "Yellow, sweet, curved shape", category: "fruit", points: 10 },
            { id: 4, name: "Broccoli", emoji: "🥦", features: "Green, tree-like shape, healthy", category: "vegetable", points: 10 },
            { id: 5, name: "Orange", emoji: "🍊", features: "Citrus, juicy, rich in vitamin C", category: "fruit", points: 10 },
            { id: 6, name: "Tomato", emoji: "🍅", features: "Red, juicy, used in salads/sauces", category: "fruit", points: 10 } // Tomato is botanically a fruit!
        ];

        let remainingObjects = [...objects];

        function renderObjects() {
            const grid = document.getElementById('objectsGrid');
            if (remainingObjects.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 2rem;">🎉 Amazing! You classified everything! 🎉</div>';
                return;
            }
            
            grid.innerHTML = remainingObjects.map(obj => `
                <div class="object-card" onclick="selectObject(${obj.id})" data-id="${obj.id}">
                    <div class="object-emoji">${obj.emoji}</div>
                    <div class="object-name">${obj.name}</div>
                    <div class="object-features">${obj.features}</div>
                </div>
            `).join('');
        }

        function selectObject(id) {
            selectedObject = remainingObjects.find(obj => obj.id === id);
            document.querySelectorAll('.object-card').forEach(card => {
                card.classList.remove('selected');
                if (card.dataset.id == id) {
                    card.classList.add('selected');
                }
            });
            
            const feedback = document.getElementById('feedback');
            feedback.className = 'feedback';
            feedback.innerHTML = `<i class="fas fa-hand-pointer"></i> Selected: ${selectedObject.name}. Now choose a category!`;
            setTimeout(() => {
                if (feedback.className === 'feedback') feedback.className = 'feedback';
            }, 1500);
        }

        function classifySelected(category) {
            if (!selectedObject) {
                showFeedback('Please select an object first!', 'error');
                return;
            }
            
            const isCorrect = selectedObject.category === category;
            
            if (isCorrect) {
                currentScore += selectedObject.points;
                classifiedCount++;
                showFeedback(`✅ Correct! ${selectedObject.name} is a ${category}! +${selectedObject.points} points`, 'success');
                
                // Remove classified object
                const index = remainingObjects.findIndex(obj => obj.id === selectedObject.id);
                if (index !== -1) remainingObjects.splice(index, 1);
                
                selectedObject = null;
                renderObjects();
            } else {
                showFeedback(`❌ Oops! ${selectedObject.name} is actually a ${selectedObject.category}. Try again!`, 'error');
            }
            
            updateUI();
        }

        function showFeedback(message, type) {
            const feedback = document.getElementById('feedback');
            feedback.className = `feedback ${type}`;
            feedback.innerHTML = message;
            setTimeout(() => {
                if (feedback.className === `feedback ${type}`) {
                    feedback.className = 'feedback';
                }
            }, 2000);
        }

        function updateUI() {
            document.getElementById('score').textContent = currentScore;
            document.getElementById('classified').textContent = classifiedCount;
            document.getElementById('total').textContent = objects.length;
            document.getElementById('totalScore').textContent = currentScore;
            
            // Save to localStorage
            let totalPoints = parseInt(localStorage.getItem('mindml_points') || 0);
            totalPoints += currentScore;
            localStorage.setItem('mindml_points', totalPoints);
            
            if (classifiedCount === objects.length) {
                const bonus = 50;
                currentScore += bonus;
                showFeedback(`🏆 Perfect! You've mastered classification! +${bonus} bonus points! 🏆`, 'success');
                document.getElementById('score').textContent = currentScore;
                document.getElementById('totalScore').textContent = currentScore;
            }
        }

        function resetGame() {
            currentScore = 0;
            classifiedCount = 0;
            selectedObject = null;
            remainingObjects = [...objects];
            renderObjects();
            updateUI();
            showFeedback('Game reset! Start classifying!', 'success');
        }

        // Initialize
        renderObjects();
        updateUI();
    </script>
</body>
</html>
