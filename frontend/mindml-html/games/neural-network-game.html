<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Network Game - MindML</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .game-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .game-header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .game-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .game-stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
        }

        .stat {
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 20px;
        }

        .game-area {
            padding: 2rem;
        }

        /* Neural Network Visualization */
        .network-container {
            background: #1e1e2e;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            overflow-x: auto;
        }

        .network {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3rem;
            min-width: 600px;
        }

        .layer {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            text-align: center;
        }

        .layer-label {
            color: white;
            font-size: 0.75rem;
            margin-top: 0.5rem;
        }

        .neuron {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .neuron.active {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
        }

        .neuron-value {
            font-size: 0.75rem;
        }

        .connection {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            height: 2px;
        }

        /* Training Panel */
        .training-panel {
            background: #f9fafb;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .input-row {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .input-node {
            text-align: center;
        }

        .input-node label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .input-node input {
            width: 80px;
            padding: 0.5rem;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            text-align: center;
        }

        .target-output {
            text-align: center;
            margin-bottom: 1rem;
        }

        .prediction {
            text-align: center;
            font-size: 1.5rem;
            margin: 1rem 0;
        }

        .train-btn {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
        }

        /* Pattern Recognition Game */
        .pattern-game {
            background: linear-gradient(135deg, #fef3c7, #fed7aa);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .pattern-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 1rem 0;
        }

        .pattern-btn {
            padding: 1rem;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .pattern-btn:hover {
            border-color: #667eea;
            transform: scale(1.02);
        }

        .score-panel {
            background: #f3f4f6;
            border-radius: 20px;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .reset-btn {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            cursor: pointer;
        }

        .feedback {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 12px;
            display: none;
        }

        .feedback.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }

        .feedback.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1><i class="fas fa-brain"></i> Neural Network Game</h1>
            <p>Train a neural network to recognize patterns!</p>
            <div class="game-stats">
                <div class="stat"><i class="fas fa-star"></i> Score: <span id="score">0</span></div>
                <div class="stat"><i class="fas fa-chart-line"></i> Accuracy: <span id="accuracy">0</span>%</div>
            </div>
        </div>

        <div class="game-area">
            <!-- Neural Network Visualization -->
            <div class="network-container">
                <div class="network">
                    <div class="layer">
                        <div class="neuron" id="input1">📊</div>
                        <div class="neuron" id="input2">📊</div>
                        <div class="layer-label">Input Layer</div>
                    </div>
                    <div class="layer">
                        <div class="neuron" id="hidden1">🧠</div>
                        <div class="neuron" id="hidden2">🧠</div>
                        <div class="neuron" id="hidden3">🧠</div>
                        <div class="layer-label">Hidden Layer</div>
                    </div>
                    <div class="layer">
                        <div class="neuron
